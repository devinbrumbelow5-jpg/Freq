# PROFITGUARD AI — OpenClaw Cron Configuration
# Add this to your OpenClaw config for automated hourly reports

jobs:
  profitguard-hourly-report:
    name: "PROFITGUARD AI Hourly Report"
    schedule: "0 * * * *"  # Every hour at minute 0
    timezone: "America/Chicago"  # Central Time
    command: "python3 /root/.openclaw/workspace/profitguard_hourly_report.py"
    working_dir: "/root/.openclaw/workspace"
    environment:
      TZ: "America/Chicago"
    notifications:
      on_success: false
      on_failure: true
    
  profitguard-risk-check:
    name: "PROFITGUARD AI Risk Check"
    schedule: "*/5 * * * *"  # Every 5 minutes
    timezone: "America/Chicago"
    command: "python3 /root/.openclaw/workspace/profitguard_risk_check.py"
    working_dir: "/root/.openclaw/workspace"
    environment:
      TZ: "America/Chicago"
    
  profitguard-soul-reinforcement:
    name: "PROFITGUARD AI Soul File Reinforcement"
    schedule: "0 */3 * * *"  # Every 3 hours
    timezone: "America/Chicago"
    command: "python3 /root/.openclaw/workspace/profitguard_soul_maintenance.py"
    working_dir: "/root/.openclaw/workspace"
    environment:
      TZ: "America/Chicago"

# Note: These jobs assume OpenClaw's cron system is available.
# If using standard cron, add to crontab:
# 0 * * * * TZ=America/Chicago python3 /root/.openclaw/workspace/profitguard_hourly_report.py >> /root/.openclaw/workspace/logs/profitguard_cron.log 2>&1
# */5 * * * * TZ=America/Chicago python3 /root/.openclaw/workspace/profitguard_risk_check.py >> /root/.openclaw/workspace/logs/profitguard_cron.log 2>&1
