version: '3.8'

services:
  # Main Freqtrade Trading Bot
  freqtrade-main:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-main
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
      - ./freqtrade/data:/freqtrade/data:cached
      - ./memory:/freqtrade/memory:cached
    environment:
      - TZ=America/Los_Angeles
      - PYTHONPATH=/freqtrade
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy AetherFreqaiStrategy
      --freqaimodel LightGBMClassifier
      --db-url sqlite:////freqtrade/data/tradesv3.dryrun.sqlite
    networks:
      - freq-network
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Trend-Following Bot
  freqtrade-trend:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-trend
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
      - ./freqtrade/data:/freqtrade/data:cached
      - ./memory:/freqtrade/memory:cached
    environment:
      - TZ=America/Los_Angeles
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy TrendFollowing_v2
      --freqaimodel LightGBMClassifier
      --db-url sqlite:////freqtrade/data/trend-trades.sqlite
    networks:
      - freq-network
    ports:
      - "8081:8080"

  # Mean-Reversion Bot
  freqtrade-meanrev:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-meanrev
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
      - ./freqtrade/data:/freqtrade/data:cached
    environment:
      - TZ=America/Los_Angeles
    command: >
      trade
      --config /freqtrade/user_data/config-meanrev.json
      --strategy MeanReversion_pro
      --db-url sqlite:////freqtrade/data/meanrev-trades.sqlite
    networks:
      - freq-network
    ports:
      - "8082:8080"

  # Breakout/Scalper Bot
  freqtrade-breakout:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-breakout
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
      - ./freqtrade/data:/freqtrade/data:cached
    environment:
      - TZ=America/Los_Angeles
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy BreakoutScalper
      --db-url sqlite:////freqtrade/data/breakout-trades.sqlite
    networks:
      - freq-network
    ports:
      - "8083:8080"

  # Hyperopt Worker (runs optimization jobs)
  freqtrade-hyperopt:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-hyperopt
    restart: "no"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
      - ./freqtrade/data:/freqtrade/data:cached
    environment:
      - TZ=America/Los_Angeles
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      hyperopt
      --config /freqtrade/user_data/config.json
      --strategy AetherFreqaiStrategy
      --freqaimodel LightGBMClassifier
      -e 500
      --spaces buy sell roi trailing stoploss
    networks:
      - freq-network
    profiles:
      - hyperopt

  # Data Downloader Service
  freqtrade-download:
    image: freqtradeorg/freqtrade:stable_freqai
    container_name: freqtrade-download
    restart: "no"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data:cached
    environment:
      - TZ=America/Los_Angeles
    command: >
      download-data
      --exchange coinbase
      --pairs BTC/USDC ETH/USDC SOL/USDC AVAX/USDC LINK/USDC UNI/USDC AAVE/USDC LDO/USDC CRV/USDC SUSHI/USDC
      --timeframes 5m 15m 1h
      --timerange 20260101-
    networks:
      - freq-network
    profiles:
      - download

  # OpenClaw Gateway (for agent orchestration)
  openclaw-gateway:
    build:
      context: .
      dockerfile: ./openclaw/Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    volumes:
      - ./:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCLAW_MODE=local
      - TZ=America/Los_Angeles
    networks:
      - freq-network
    ports:
      - "8088:8088"
    depends_on:
      - freqtrade-main

  # Kimi Server (local LLM inference)
  kimi-server:
    image: ollama/ollama:latest
    container_name: kimi-server
    restart: unless-stopped
    volumes:
      - kimi-models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - freq-network
    ports:
      - "11434:11434"
    command: serve

  # Redis for inter-service communication
  redis:
    image: redis:7-alpine
    container_name: freqtrade-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - freq-network
    ports:
      - "6379:6379"

  # Notifier service for alerts
  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    container_name: freqtrade-notifier
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=America/Los_Angeles
    networks:
      - freq-network
    depends_on:
      - redis

volumes:
  kimi-models:
    driver: local
  redis-data:
    driver: local

networks:
  freq-network:
    driver: bridge
